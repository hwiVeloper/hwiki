name: KBO Daily Ingest

on:
  schedule:
    # 매일 새벽 2시 KST (UTC 17:00) — 전날 경기 종료 후
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '수집 날짜 (YYYYMMDD, 비워두면 전날)'
        required: false
        default: ''

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-scraper.txt

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements-scraper.txt
          playwright install chromium --with-deps

      - name: Run KBO scraper
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -n "$DATE" ]; then
            python scripts/kbo_scraper.py "$DATE"
          else
            python scripts/kbo_scraper.py
          fi

      - name: Check for new files
        id: check
        run: |
          git add raw/ wiki/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "kbo-ingest-bot"
          git config user.email "bot@hwiki"
          DATE=$(date +%Y%m%d -d "yesterday" 2>/dev/null || date -v -1d +%Y%m%d)
          git commit -m "chore: KBO ingest ${DATE}"
          git push
